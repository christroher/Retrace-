<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retrace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="sidebar.css">
</head>
<body>

<div class="sidebar" id="sidebar">
  <!-- Header: Brand + Search integrated -->
  <div class="sidebar-header">
    <!-- Search + Actions -->
    <div class="search-row">
      <div class="search-box">
        <span class="search-icon-trigger">
          <span class="search-icon">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <circle cx="7" cy="7" r="4.5"/>
              <path d="M10.5 10.5L14 14"/>
            </svg>
          </span>
          <div class="search-hint-popup">
            <div class="hint-arrow"></div>
            <div class="hint-title">支持 JavaScript 正则搜索技巧</div>
            <div class="hint-item"><code>收件箱</code> <span>普通包含</span></div>
            <div class="hint-item"><code>^收件箱</code> <span>以"收件箱"开头</span></div>
            <div class="hint-item"><code>Error|Bug</code> <span>包含任一</span></div>
            <div class="hint-item"><code>\d+</code> <span>含数字的页面</span></div>
            <div class="hint-item"><code>github.com</code> <span>指定域名</span></div>
          </div>
        </span>
        <input type="text" id="searchInput" placeholder="搜索标题或 URL..." spellcheck="false">
      </div>
      <button class="btn-icon" id="btnSettings" title="浏览器历史设置" aria-label="设置">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="2.5"/>
          <path d="M8 13.5a5.5 5.5 0 0 0 5.5-5.5"/>
          <path d="M8 2.5A5.5 5.5 0 0 0 2.5 8"/>
          <path d="M8 10.5a2.5 2.5 0 0 0 2.5-2.5"/>
          <path d="M8 5.5A2.5 2.5 0 0 0 5.5 8"/>
        </svg>
      </button>
      <button class="btn-icon" id="btnClose" title="回到顶部" aria-label="回到顶部">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 10l5-5 5 5"/>
        </svg>
      </button>
      <div class="calendar-wrap">
        <button class="btn-icon search-calendar" id="btnCalendar" title="按日期筛选" aria-label="日历">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="3" width="12" height="11" rx="1.5"/>
            <path d="M2 6.5h12M5 1.5V4M11 1.5V4"/>
          </svg>
        </button>
        <div class="calendar-panel" id="calendarPanel">
          <div class="cal-header">
            <span class="cal-nav cal-nav-wide" id="calYearPrev">‹‹</span>
            <span class="cal-nav" id="calPrev">‹</span>
            <span class="cal-title" id="calTitle">2026年6月</span>
            <span class="cal-nav" id="calNext">›</span>
            <span class="cal-nav cal-nav-wide" id="calYearNext">››</span>
          </div>
          <table class="cal-grid">
            <thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead>
            <tbody id="calBody"></tbody>
          </table>
          <div class="cal-tags" id="calTags">
            <span class="cal-tags-line1">当前筛选：</span>
            <span class="cal-tags-line2">
              <span class="cal-tag" id="calTagStart">
                <span class="cal-tag-text" id="calTagStartText">2026/06/08</span>
                <span class="cal-tag-x">✕</span>
              </span>
              <span class="cal-tag-sep">到</span>
              <span class="cal-tag" id="calTagEnd">
                <span class="cal-tag-text" id="calTagEndText">2026/06/11</span>
                <span class="cal-tag-x">✕</span>
              </span>
              <span class="cal-tag-none" id="calTagNone">无</span>
            </span>
          </div>
        </div>
      </div>
    </div>

    <!-- Quick Filters -->
    <div class="filter-row">
      <div class="quick-row" id="quickRow">
        <span class="quick-btn" data-filter="today">今天</span>
        <span class="quick-btn" data-filter="yesterday">昨天</span>
        <span class="quick-btn" data-filter="week">本周</span>
        <span class="quick-btn" data-filter="month">本月</span>
      </div>
      <div class="filter-tag-row" id="filterTagRow">
        <span class="filter-tag" id="filterTag">
          <span class="filter-tag-text" id="filterTagText">2026/06/08 ~ 2026/06/11</span>
          <span class="filter-tag-x" id="filterTagX">✕</span>
        </span>
      </div>
    </div>
  </div>

  <!-- Sticky Date Header (fixed via JS) -->
  <div class="sticky-date js-date-fixed hidden" id="stickyDate">
    <span class="sticky-date-label" id="stickyDateLabel">加载中...</span>
    <button class="sticky-help" id="stickyHelp" title="查看引导">?</button>
  </div>

  <div class="sidebar-scroll" id="sidebarScroll">
    <div id="historyList"></div>
  </div>

  <!-- Undo Toast -->
  <div class="toast" id="toast">
    <span class="toast-text" id="toastText">已删除</span>
    <button class="toast-undo" id="btnUndo">撤销</button>
  </div>

  <!-- Onboarding Overlay -->
  <div class="onb-overlay" id="onbOverlay">
    <div class="onb-mask" id="onbMask"></div>
    <div class="onb-highlight" id="onbHighlight"></div>
    <div class="onb-tooltip" id="onbTooltip">
      <div class="onb-step-indicator" id="onbStepIndicator">1 / 4</div>
      <div class="onb-text" id="onbText"></div>
      <div class="onb-actions">
        <span class="onb-skip" id="onbSkip">跳过</span>
        <button class="onb-next" id="onbNext">下一步</button>
      </div>
    </div>
    <!-- Step 4: Shortcuts modal (centered) -->
    <div class="onb-modal" id="onbModal">
      <div class="onb-modal-title">键盘快捷键</div>
      <table class="onb-shortcut-list">
        <tr><td><kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>R</kbd></td><td>打开/关闭侧边栏</td></tr>
        <tr><td><kbd>Ctrl</kbd>+<kbd>F</kbd> 或 <kbd>/</kbd></td><td>聚焦搜索框</td></tr>
        <tr><td><kbd>Esc</kbd></td><td>清空搜索 / 关闭日历</td></tr>
        <tr><td><kbd>J</kbd> / <kbd>K</kbd></td><td>上下滚动</td></tr>
        <tr><td><kbd>D</kbd></td><td>删除悬停卡片</td></tr>
      </table>
      <button class="onb-finish" id="onbFinish">开始使用</button>
    </div>
  </div>
</div>

<script src="sidebar.js"></script>
</body>
</html>
